name: zoro_flutter
description: Zoro iOS client — uses the same Next.js API and Supabase as zoro-app.
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  firebase_core: ^3.15.2
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.2.3
  sankey_flutter: ^0.0.3
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  dirham_symbol: ^0.3.2
  syncfusion_flutter_pdf: ^33.2.5
  pdf_struct_extractor: ^0.1.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../zoro-app/public/icon-light.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/currency/
