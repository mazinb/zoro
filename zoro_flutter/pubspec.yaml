name: zoro_flutter
description: Zoro iOS client — uses the same Next.js API and Supabase as zoro-app.
publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_secure_storage: ^9.2.4
  in_app_purchase: ^3.2.3
  flutter_svg: ^2.2.3
  sankey_flutter: ^0.0.3
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  dirham_symbol: ^0.3.2
  syncfusion_flutter_pdf: ^33.2.5
  pdf_struct_extractor: ^0.1.0
  flutter_markdown: ^0.7.7+1
  flutter_local_notifications: ^19.4.1
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  path_provider_platform_interface: ^2.1.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../zoro-app/public/icon-light.png"
  remove_alpha_ios: true

# path_provider_foundation 2.6+ depends on package:objective_c (native iOS hooks). On some
# Xcode / Flutter combos the wrong slice (iOS-simulator) gets embedded for device builds,
# causing dlopen "incompatible platform (have 'iOS-simulator', need 'iOS')" at runtime.
# 2.5.1 uses the classic Pigeon plugin without objective_c — safe until upstream fixes land.
dependency_overrides:
  path_provider_foundation: 2.5.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
